# Operator screen.
# https://github.com/carrefinho/prospector-zmk-module/tree/feat/new-status-screens
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

# No ambient light sensor fitted: the upstream default
# (CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y) polls a missing APDS9960,
# maps the failed reading to the minimum duty cycle, and fades the backlight
# down to 1%.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80
